apiVersion: v1
kind: Service
metadata:
  name: resume-analyzer-backend
  namespace: default
  labels:
    app: resume-analyzer
    component: backend
spec:
  selector:
    app: resume-analyzer
    component: backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: resume-analyzer-frontend
  namespace: default
  labels:
    app: resume-analyzer
    component: frontend
spec:
  selector:
    app: resume-analyzer
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
